server {
    listen 80;
    server_name 72.62.104.136;
 
    # Imagens geradas (Python) - para preview funcionar
    location /presentation-output/ {
        proxy_pass http://localhost:3001/presentation-output/;
        proxy_set_header Host $host;
    }
 
    # Arquivos do histórico (storage)
    location /storage/ {
        proxy_pass http://localhost:3001/storage/;
        proxy_set_header Host $host;
    }
 
    # (Opcional) Fontes usadas pelo gerador
    location /presentation-fonts/ {
        proxy_pass http://localhost:3001/presentation-fonts/;
        proxy_set_header Host $host;
    }
 
    # Frontend - Arquivos Estáticos
    location / {
        root /var/www/mvp-system/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
 
    # Backend - API Proxy
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}