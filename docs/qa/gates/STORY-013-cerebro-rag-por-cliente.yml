  security:
    isolamento_cliente: 'VERIFIED — retrieve(), ingest(), reindexCliente() e todas as branches de resolveSourceTexts filtram por cliente_id ANTES da busca vetorial. Endpoint protegido por JWT + hasClientAccess.'
    sql_injection: 'VERIFIED — todas as queries usam parameter binding. SET LOCAL hnsw.ef_search interpola apenas inteiro validado de env (não input do usuário).'
  performance: 'HNSW ef_search=40 confinado por transação (SET LOCAL), embeddings em batch (até 250), cache LRU 500 entradas, dedup evita embeddings redundantes.'
  graceful_degradation: 'VERIFIED — calendarGenerator e geminiCalendar envolvem o retrieve em try/catch; falha de RAG → log warn + geração normal sem o bloco.'
  worker_retry: 'VERIFIED — isTransientError classifica; erros não-transientes (4xx/validação) vão direto para failed sem retry infinito; backoff 1s/4s/16s, max 3 tentativas.'
